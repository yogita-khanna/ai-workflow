<svg viewBox="0 0 600 1050" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="600" height="1050" fill="#0a0a0a"/>
  
  <text x="300" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">DevFlow Architecture (Token Optimized)</text>
  
  <!-- Nodes -->
  <!-- 1. Trigger -->
  <rect x="150" y="70" width="300" height="60" rx="10" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="2"/>
  <text x="300" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Start: New Feature or Bug</text>
  <text x="300" y="118" text-anchor="middle" font-size="12" fill="#a8a8a8">Human requests work</text>
  
  <line x1="300" y1="130" x2="300" y2="162" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 2. Routing -->
  <rect x="150" y="170" width="300" height="60" rx="10" fill="#1f3f66" stroke="#2f6db3" stroke-width="2"/>
  <text x="300" y="198" text-anchor="middle" font-size="16" font-weight="bold" fill="#e3f1ff">1. using-devflow</text>
  <text x="300" y="218" text-anchor="middle" font-size="12" fill="#9dc4e8">Agent routes to the correct skill</text>

  <!-- Branching Lines -->
  <path d="M 300 230 L 300 250 L 160 250 L 160 272" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 300 230 L 300 250 L 440 250 L 440 272" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="160" y="245" text-anchor="middle" font-size="12" fill="#888">New Ticket</text>
  <text x="440" y="245" text-anchor="middle" font-size="12" fill="#888">Jira Bug</text>

  <!-- 3a. Planning (Feature) -->
  <rect x="40" y="280" width="240" height="90" rx="10" fill="#453b8c" stroke="#5f52b8" stroke-width="2"/>
  <text x="160" y="308" text-anchor="middle" font-size="16" font-weight="bold" fill="#e9e6ff">2a. classify-ticket</text>
  <text x="160" y="328" text-anchor="middle" font-size="16" font-weight="bold" fill="#e9e6ff">&amp; writing-a-spec</text>
  <text x="160" y="352" text-anchor="middle" font-size="12" fill="#c3bdf0">Score risk &amp; generate design.md</text>

  <!-- 3b. Planning (Bug) -->
  <rect x="320" y="280" width="240" height="90" rx="10" fill="#7a2e22" stroke="#a8402f" stroke-width="2"/>
  <text x="440" y="318" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffe9e4">2b. picking-a-jira-bug</text>
  <text x="440" y="342" text-anchor="middle" font-size="12" fill="#e6a294">Fetch &amp; prioritize bug</text>

  <!-- Join Lines -->
  <path d="M 160 370 L 160 400 L 290 400 L 290 422" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 440 370 L 440 400 L 310 400 L 310 422" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Worktree (Parallel Agents) -->
  <rect x="20" y="430" width="160" height="60" rx="10" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="2"/>
  <text x="100" y="458" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Agent 1</text>
  <text x="100" y="475" text-anchor="middle" font-size="11" fill="#a8a8a8">worktree-feature-a</text>

  <rect x="220" y="430" width="160" height="60" rx="10" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="2"/>
  <text x="300" y="458" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Agent 2</text>
  <text x="300" y="475" text-anchor="middle" font-size="11" fill="#a8a8a8">worktree-feature-b</text>

  <rect x="420" y="430" width="160" height="60" rx="10" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="2"/>
  <text x="500" y="458" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Agent 3</text>
  <text x="500" y="475" text-anchor="middle" font-size="11" fill="#a8a8a8">worktree-bugfix-c</text>

  <!-- Connect Agents to Context Optimization -->
  <line x1="100" y1="490" x2="100" y2="520" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="490" x2="300" y2="520" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="490" x2="500" y2="520" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- NEW TOKEN OPTIMIZATION LAYER -->
  <rect x="20" y="530" width="560" height="50" rx="10" fill="#1f3f66" stroke="#2f6db3" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="300" y="552" text-anchor="middle" font-size="14" font-weight="bold" fill="#e3f1ff">TOKEN ISOLATION LAYER (CLAUDE.md)</text>
  <text x="300" y="570" text-anchor="middle" font-size="12" fill="#9dc4e8">Agent reads 1 file instead of scanning repo → Prevents context blowout</text>

  <!-- Connect Context to TDD -->
  <line x1="100" y1="580" x2="100" y2="610" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="580" x2="300" y2="610" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="580" x2="500" y2="610" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Execution (TDD) -->
  <rect x="20" y="620" width="160" height="85" rx="10" fill="#0e6b58" stroke="#12a186" stroke-width="2"/>
  <text x="100" y="645" text-anchor="middle" font-size="14" font-weight="bold" fill="#e3fff8">4. tdd-loop</text>
  <text x="100" y="665" text-anchor="middle" font-size="11" fill="#8fe4cf">Red → Green</text>
  <text x="100" y="690" text-anchor="middle" font-size="10" fill="#8fe4cf">(turbo filtered logs)</text>

  <rect x="220" y="620" width="160" height="85" rx="10" fill="#0e6b58" stroke="#12a186" stroke-width="2"/>
  <text x="300" y="645" text-anchor="middle" font-size="14" font-weight="bold" fill="#e3fff8">4. tdd-loop</text>
  <text x="300" y="665" text-anchor="middle" font-size="11" fill="#8fe4cf">Red → Green</text>
  <text x="300" y="690" text-anchor="middle" font-size="10" fill="#8fe4cf">(turbo filtered logs)</text>

  <rect x="420" y="620" width="160" height="85" rx="10" fill="#0e6b58" stroke="#12a186" stroke-width="2"/>
  <text x="500" y="645" text-anchor="middle" font-size="14" font-weight="bold" fill="#e3fff8">4. tdd-loop</text>
  <text x="500" y="665" text-anchor="middle" font-size="11" fill="#8fe4cf">Red → Green</text>
  <text x="500" y="690" text-anchor="middle" font-size="10" fill="#8fe4cf">(turbo filtered logs)</text>

  <!-- Join Agents back to PR stage -->
  <path d="M 100 705 L 100 725 L 300 725 L 300 745" fill="none" stroke="#888" stroke-width="2"/>
  <path d="M 500 705 L 500 725 L 300 725 L 300 745" fill="none" stroke="#888" stroke-width="2"/>
  <line x1="300" y1="705" x2="300" y2="745" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. PR & Review -->
  <rect x="150" y="745" width="300" height="60" rx="10" fill="#453b8c" stroke="#5f52b8" stroke-width="2"/>
  <text x="300" y="773" text-anchor="middle" font-size="16" font-weight="bold" fill="#e9e6ff">5. finishing-a-branch</text>
  <text x="300" y="793" text-anchor="middle" font-size="12" fill="#c3bdf0">Lint, E2E tests, and open Pull Request</text>

  <line x1="300" y1="805" x2="300" y2="837" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. Reviewing -->
  <rect x="150" y="845" width="300" height="60" rx="10" fill="#7a2e22" stroke="#a8402f" stroke-width="2"/>
  <text x="300" y="873" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffe9e4">6. reviewing-a-pr</text>
  <text x="300" y="893" text-anchor="middle" font-size="12" fill="#e6a294">Agent security review (SQLi, Auth)</text>

  <line x1="300" y1="905" x2="300" y2="937" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8. Finish -->
  <rect x="150" y="945" width="300" height="60" rx="10" fill="#1a1a1a" stroke="#a8402f" stroke-dasharray="10,6" stroke-width="2"/>
  <text x="300" y="973" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffb4a2">7. Human Approves &amp; Merges</text>
  <text x="300" y="993" text-anchor="middle" font-size="12" fill="#d8a99c">End of agent lifecycle for this ticket</text>

</svg>